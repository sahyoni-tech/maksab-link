<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>مكسب · MAKSAB</title>
  <meta name="description" content="مكسب — عروض دمشق اللحظية. تابع متاجرك المفضّلة واحصل على تنبيه فور نزول عرض جديد." />
  <style>
    :root { --coral:#D85A30; --charcoal:#1A1A1A; --stone:#F1EFE8; --muted:#6B655C; }
    * { box-sizing:border-box; }
    html,body { margin:0; height:100%; }
    body {
      background:var(--stone); color:var(--charcoal);
      font-family:-apple-system,"Segoe UI",Roboto,"Helvetica Neue","Noto Kufi Arabic","Tajawal",Arial,sans-serif;
      display:flex; align-items:center; justify-content:center; padding:32px 24px; text-align:center;
    }
    .card { max-width:440px; width:100%; }
    .mark { font-size:64px; font-weight:800; letter-spacing:-1px; margin:0; }
    .word { color:var(--muted); font-size:15px; letter-spacing:3px; margin:6px 0 28px; }
    h1 { font-size:24px; margin:0 0 12px; line-height:1.4; }
    p { font-size:16px; color:var(--muted); line-height:1.7; margin:0 0 28px; }
    .dot { color:var(--coral); }
  </style>
</head>
<body>
  <main class="card">
    <p class="mark">مكسب</p>
    <p class="word">MAKSAB</p>
    <h1>عروض دمشق اللحظية <span class="dot">·</span></h1>
    <p>تابع متاجرك المفضّلة في دمشق واحصل على تنبيه فوري فور نزول عرض جديد — قبل أن ينفد.</p>
  </main>
</body>
</html>
